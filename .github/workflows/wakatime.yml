name: 📊 Waka Readme

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Update README
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TITLE: true
          # Use a gradient block for a cool effect
          BLOCKS: "⣀⣤⣦⣶⣷⣿"
          TIME_RANGE: last_7_days
          LANG_COUNT: 5
          SHOW_TOTAL: true
          SHOW_LOC: true          # Lines of Code
          SHOW_EDITORS: true      # VS Code vs IntelliJ
          SHOW_OS: true           # Windows vs Mac
          SHOW_PROJECTS: true     # Which projects you coded in
          SHOW_DAYS_OF_WEEK: true # Coding heatmap by day
          COMMIT_BY_ME: true
          COMMIT_MSG: "⏱ chore: update waka stats [skip ci]"
